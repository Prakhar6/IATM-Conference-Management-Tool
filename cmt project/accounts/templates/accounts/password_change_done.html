{% extends "dashboard.html" %}

{% block title %}Password Changed - IATM Conference{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 text-center py-5">
        <div style="background: linear-gradient(135deg, #10b981, #059669); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <i class="fas fa-check text-white fs-2"></i>
        </div>
        <h3 class="fw-bold mb-3">Password Updated Successfully</h3>
        <p class="text-muted mb-4">Your password has been changed. Use your new password next time you log in.</p>
        <a href="{% url 'profile' %}" class="btn btn-primary">
            <i class="fas fa-user me-1"></i>Back to Profile
        </a>
    </div>
</div>
{% endblock %}
