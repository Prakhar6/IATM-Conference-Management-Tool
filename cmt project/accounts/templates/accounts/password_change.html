{% extends "dashboard.html" %}
{% load crispy_forms_tags %}

{% block title %}Change Password - IATM Conference{% endblock %}

{% block content %}
<div class="mb-4">
    <h2 style="font-weight: 700; color: #1e293b;">
        <i class="fas fa-key me-2" style="color: #667eea;"></i>Change Password
    </h2>
    <p class="text-muted">Update your account password.</p>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm" style="border-radius: 16px;">
            <div class="card-body p-4">
                <form method="POST" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Update Password
                        </button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
