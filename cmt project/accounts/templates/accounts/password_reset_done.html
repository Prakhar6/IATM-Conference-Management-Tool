{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow-sm border-0" style="max-width: 450px; width: 100%;">
        <div class="card-header bg-dark text-white text-center rounded-top">
            <h4 class="mb-0">Email Sent</h4>
        </div>
        <div class="card-body p-4 text-center">
            <div style="background: linear-gradient(135deg, #3b82f6, #2563eb); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="fas fa-envelope text-white fs-3"></i>
            </div>
            <h5 class="fw-bold mb-3">Check Your Email</h5>
            <p class="text-muted">If an account exists with that email address, we've sent password reset instructions. Please check your inbox and spam folder.</p>
            <a href="{% url 'login' %}" class="btn btn-dark mt-2">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
