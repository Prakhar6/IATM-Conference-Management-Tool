{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow-sm border-0" style="max-width: 400px; width: 100%;">
        <div class="card-header bg-dark text-white text-center rounded-top">
            <h4 class="mb-0">Password Reset Complete</h4>
        </div>
        <div class="card-body p-4 text-center">
            <div style="background: linear-gradient(135deg, #10b981, #059669); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="fas fa-check text-white fs-3"></i>
            </div>
            <h5 class="fw-bold mb-3">Success!</h5>
            <p class="text-muted">Your password has been reset. You can now log in with your new password.</p>
            <a href="{% url 'login' %}" class="btn btn-dark mt-2">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
