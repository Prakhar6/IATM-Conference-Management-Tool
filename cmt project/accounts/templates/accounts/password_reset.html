{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow-sm border-0" style="max-width: 400px; width: 100%;">
        <div class="card-header bg-dark text-white text-center rounded-top">
            <h4 class="mb-0">Reset Password</h4>
        </div>
        <div class="card-body p-4">
            <p class="text-muted mb-3">Enter your email address and we'll send you a link to reset your password.</p>
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark">Send Reset Link</button>
                </div>
            </form>
            <div class="mt-4 text-center">
                <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
