{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow-sm border-0" style="max-width: 400px; width: 100%;">
        <div class="card-header bg-dark text-white text-center rounded-top">
            <h4 class="mb-0">Set New Password</h4>
        </div>
        <div class="card-body p-4">
            {% if validlink %}
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark">Set Password</button>
                </div>
            </form>
            {% else %}
            <div class="text-center">
                <div style="background: linear-gradient(135deg, #ef4444, #dc2626); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i class="fas fa-times text-white fs-3"></i>
                </div>
                <h5 class="fw-bold mb-3">Invalid Link</h5>
                <p class="text-muted">This password reset link is invalid or has expired.</p>
                <a href="{% url 'password_reset' %}" class="btn btn-dark">Request a New Link</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
