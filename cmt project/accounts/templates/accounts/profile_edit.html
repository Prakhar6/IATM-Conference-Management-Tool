{% extends 'dashboard.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm" style="border-radius: 16px; border: 1px solid rgba(102, 126, 234, 0.1);">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center mb-4 pb-3" style="border-bottom: 2px solid #f1f5f9;">
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 1rem;">
                            <i class="fas fa-user-edit" style="color: white; font-size: 1.25rem;"></i>
                        </div>
                        <h2 class="mb-0" style="font-weight: 700; color: #1e293b;">Edit Profile</h2>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-primary flex-grow-1" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 0.75rem; border-radius: 12px; font-weight: 600;">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                            <a href="{% url 'profile' %}" class="btn btn-outline-secondary" style="padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600;">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
